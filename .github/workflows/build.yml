name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: sudo apt-get update -qq && sudo apt-get install -y git zip unzip openjdk-17-jdk libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev cmake
    - name: Install buildozer
      run: pip install --upgrade buildozer cython==0.29.36
    - name: Build APK
      run: buildozer -v android debug
      timeout-minutes: 60
    - uses: actions/upload-artifact@v4
      with:
        name: AnimeUpscaler-APK
        path: bin/*.apk
        retention-days: 30
